name: Backup Worker
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for backup'
        required: false
        default: 'watchdog_trigger'
      failed_worker:
        description: 'Name of failed worker'
        required: false
        default: 'unknown'
permissions:
  contents: write
  actions: write
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python worker.py
        env:
          WORKER_NAME: "Backup_Z"
          SYMBOL: "EUR/USD"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_MARKET: ${{ secrets.TELEGRAM_CHAT_ID_MARKET }}
          TWELVEDATA_KEYS: ${{ secrets.TWELVEDATA_KEYS }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}